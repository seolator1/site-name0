<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현대리바트 뉴스 보관함</title>
    <style>
        /* 1. 전체 배경 및 폰트 설정 */
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. 제목 섹션 */
        h1 { 
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 40px;
            text-align: center;
        }
        h1 span { color: #ff6b00; } /* 리바트 포인트 컬러 */

        /* 3. 카드 레이아웃 (그리드) */
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2열 배치 */
            gap: 20px;
        }

        /* 모바일용 1열 배치 */
        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
        }

        /* 4. 개별 뉴스 카드 디자인 */
        .news-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            border: 1px solid #eee;
        }

        /* 마우스 올렸을 때 효과 */
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
            border-color: #ff6b00;
        }

        .category {
            font-size: 0.8rem;
            color: #ff6b00;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #222;
            line-height: 1.4;
            margin-bottom: 12px;
            display: block;
        }

        .go-btn {
            font-size: 0.9rem;
            color: #888;
            display: flex;
            align-items: center;
        }

        .go-btn::after {
            content: ' →';
            transition: margin-left 0.3s;
        }

        .news-card:hover .go-btn::after {
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <h1>현대<span>리바트</span> 뉴스 아카이브</h1>

    <div class="container">
        <a href="./fnnews/" class="news-card">
            <span class="category">Financial News</span>
            <span class="title">현대리바트, 공간의 가치를 더하는 최신 소식</span>
            <div class="go-btn">기사 읽기</div>
        </a>

        <a href="./sisajournal/" class="news-card">
            <span class="category">Sisa Journal e</span>
            <span class="title">가구 산업의 트렌드와 리바트의 전략 분석</span>
            <div class="go-btn">기사 읽기</div>
        </a>

        <a href="./asiae/" class="news-card">
            <span class="category">Asia Economy</span>
            <span class="title">시장 점유율 확대를 위한 리바트의 행보</span>
            <div class="go-btn">기사 읽기</div>
        </a>

        <a href="./mbn2/" class="news-card">
            <span class="category">MBN Money</span>
            <span class="title">B2B와 B2C를 아우르는 가구 솔루션</span>
            <div class="go-btn">기사 읽기</div>
        </a>
    </div>

</body>
</html>
