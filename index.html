<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYUNDAI LIVART | PREMIUM NEWS ARCHIVE</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        /* 1. 전체 배경: 딥 블랙 & 미니멀 */
        :root {
            --bg-color: #000000; /* 완전 블랙 */
            --card-bg: #111111; /* 살짝 밝은 블랙 */
            --point-color: #ff6b00; /* 리바트 오렌지 */
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --card-hover-bg: #1a1a1a;
        }

        body { 
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased; /* 글씨를 더 선명하게 */
        }

        /* 2. 헤더 디자인: 로고 애니메이션 및 타이포그래피 */
        header {
            text-align: center;
            margin-bottom: 100px;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [핵심] 현대리바트 로고 애니메이션 */
        .logo-container {
            width: 150px;
            height: 50px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            color: var(--text-primary);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-livart {
            color: var(--point-color);
            position: relative;
        }

        /* 로고 밑에 움직이는 오렌지색 선 애니메이션 */
        .logo-livart::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 4px;
            background-color: var(--point-color);
            box-shadow: 0 0 15px var(--point-color);
            border-radius: 2px;
            animation: logo-underline 2s ease-out forwards;
        }

        @keyframes logo-underline {
            0% { width: 0; left: 50%; }
            100% { width: 100%; left: 0; }
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-top: 15px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* 3. 컨테이너: 그리드 레이아웃 */
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* 모바일용 1열 배치 */
        @media (max-width: 650px) {
            .container { grid-template-columns: 1fr; }
            .logo-text { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
        }

        /* 4. 개별 뉴스 카드 디자인: 초미니멀 프리미엄 블랙 */
        .news-card {
            background-color: var(--card-bg);
            border: 1px solid #222; /* 아주 미세한 테두리 */
            border-radius: 20px;
            padding: 40px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); /* 부드러운 애니메이션 */
            position: relative;
            overflow: hidden;
        }

        /* [핵심 마우스 효과] 카드가 커지면서 테두리가 오렌지색 네온으로 빛남 */
        .news-card:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: var(--point-color);
            background-color: var(--card-hover-bg);
            box-shadow: 0 15px 40px rgba(255, 107, 0, 0.15);
        }

        /* 카드 왼쪽 상단에 은은한 빛 효과 */
        .news-card::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -60px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255,107,0,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            transition: all 0.5s ease;
            opacity: 0;
        }

        .news-card:hover::before {
            opacity: 1;
            transform: scale(1.2);
        }

        .card-top { margin-bottom: 25px; }

        .category {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        /* 마우스 올리면 카테고리 색상 변경 */
        .news-card:hover .category { color: var(--point-color); }

        .title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: -1px;
            display: block;
            transition: all 0.3s ease;
        }

        /* [핵심 효과] 기사 읽기 버튼 대신 트렌디한 화살표 */
        .card-bottom {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .arrow-icon {
            width: 35px;
            height: 35px;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 1.3rem;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 마우스 올리면 화살표 버튼이 오렌지색으로 가득 참 */
        .news-card:hover .arrow-icon {
            background-color: var(--point-color);
            border-color: var(--point-color);
            color: #000;
            transform: translateX(8px);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-text">
                HYUNDAI <span class="logo-livart">LIVART</span>
            </div>
        </div>
        <div class="subtitle">PREMIUM NEWS ARCHIVE</div>
    </header>

    <div class="container">
        <a href="./fnnews/" class="news-card">
            <div class="card-top">
                <span class="category">Financial News</span>
                <span class="title">현대리바트, 공간의 가치를 더하는 최신 소식</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./sisajournal/" class="news-card">
            <div class="card-top">
                <span class="category">Sisa Journal e</span>
                <span class="title">가구 산업의 트렌드와 리바트의 전략 분석</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./asiae/" class="news-card">
            <div class="card-top">
                <span class="category">Asia Economy</span>
                <span class="title">시장 점유율 확대를 위한 리바트의 행보</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./mbn2/" class="news-card">
            <div class="card-top">
                <span class="category">MBN Money</span>
                <span class="title">B2B와 B2C를 아우르는 가구 솔루션</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>
    </div>

</body>
</html>
