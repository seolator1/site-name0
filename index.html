<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYUNDAI LIVART | NEWS ARCHIVE</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        /* 1. 전체 배경: 딥 블랙 & 미니멀 */
        :root {
            --bg-color: #000000; /* 완전 블랙 */
            --card-bg: #111111; /* 살짝 밝은 블랙 */
            --point-color: #ff6b00; /* 리바트 오렌지 */
            --text-primary: #ffffff;
            --text-secondary: #888888;
        }

        body { 
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased; /* 글씨를 더 선명하게 */
        }

        /* 2. 헤더 디자인: 타이포그래피 강조 */
        header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
            max-width: 800px;
        }

        h1 { 
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -2px; /* 글자 간격 줄임 */
            margin: 0;
            text-transform: uppercase;
        }
        h1 span { 
            color: var(--point-color);
            position: relative;
        }
        /* 오렌지색 글씨 밑에 은은한 네온 효과 */
        h1 span::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--point-color);
            box-shadow: 0 0 15px var(--point-color);
            border-radius: 2px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 3. 컨테이너: 그리드 레이아웃 */
        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* 모바일용 1열 배치 */
        @media (max-width: 650px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }

        /* 4. 개별 뉴스 카드 디자인: 프리미엄 블랙 */
        .news-card {
            background-color: var(--card-bg);
            border: 1px solid #222; /* 아주 미세한 테두리 */
            border-radius: 16px;
            padding: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); /* 부드러운 애니메이션 */
            position: relative;
            overflow: hidden;
        }

        /* [핵심 마우스 효과] 카드가 커지면서 테두리가 오렌지색 네온으로 빛남 */
        .news-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--point-color);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
        }

        /* 카드 왼쪽 상단에 은은한 빛 효과 */
        .news-card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,107,0,0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .news-card:hover::before {
            background: radial-gradient(circle, rgba(255,107,0,0.2) 0%, rgba(0,0,0,0) 70%);
        }

        .card-top { margin-bottom: 20px; }

        .category {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        /* 마우스 올리면 카테고리 색상 변경 */
        .news-card:hover .category { color: var(--point-color); }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: -0.5px;
            display: block;
        }

        /* [핵심 효과] 기사 읽기 버튼 대신 트렌디한 화살표 */
        .card-bottom {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .arrow-icon {
            width: 30px;
            height: 30px;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        /* 마우스 올리면 화살표 버튼이 오렌지색으로 가득 참 */
        .news-card:hover .arrow-icon {
            background-color: var(--point-color);
            border-color: var(--point-color);
            color: #000;
            transform: translateX(5px);
        }

    </style>
</head>
<body>

    <header>
        <h1>HYUNDAI <span>LIVART</span></h1>
        <div class="subtitle">PREMIUM NEWS ARCHIVE</div>
    </header>

    <div class="container">
        <a href="./fnnews/" class="news-card">
            <div class="card-top">
                <span class="category">Financial News</span>
                <span class="title">현대리바트, 공간의 가치를 더하는 최신 소식</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./sisajournal/" class="news-card">
            <div class="card-top">
                <span class="category">Sisa Journal e</span>
                <span class="title">가구 산업의 트렌드와 리바트의 전략 분석</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./asiae/" class="news-card">
            <div class="card-top">
                <span class="category">Asia Economy</span>
                <span class="title">시장 점유율 확대를 위한 리바트의 행보</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>

        <a href="./mbn2/" class="news-card">
            <div class="card-top">
                <span class="category">MBN Money</span>
                <span class="title">B2B와 B2C를 아우르는 가구 솔루션</span>
            </div>
            <div class="card-bottom">
                <div class="arrow-icon">→</div>
            </div>
        </a>
    </div>

</body>
</html>
