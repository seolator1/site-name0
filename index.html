<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYUNDAI LIVART | DASHBOARD</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --point-color: #ff6b00; /* 리바트 오렌지 */
            --stock-neon: #00ff88; /* 주가용 그린 */
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --card-hover-bg: #1a1a1a;
        }

        body { 
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        /* 헤더 스타일 */
        header {
            text-align: center;
            margin-bottom: 60px;
            width: 100%;
            max-width: 900px;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .logo-livart { color: var(--point-color); position: relative; }
        .logo-livart::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px;
            background-color: var(--point-color); box-shadow: 0 0 15px var(--point-color);
        }

        /* 섹션 구분 레이블 */
        .section-label {
            width: 100%;
            max-width: 900px;
            margin: 40px 0 20px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
            border-left: 3px solid var(--text-secondary);
            padding-left: 15px;
        }

        /* [STOCK SECTION] 주가 전광판 디자인 */
        .stock-container {
            width: 100%;
            max-width: 900px;
            margin-bottom: 20px;
        }

        .stock-card {
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 40px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .stock-card:hover {
            border-color: var(--stock-neon);
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.1);
        }

        .stock-card h2 { margin: 0; font-size: 1.6rem; color: #fff; }
        .stock-card p { margin: 8px 0 0; color: var(--stock-neon); font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; }
        
        .stock-status {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--stock-neon);
            text-shadow: 0 0 15px var(--stock-neon);
        }

        /* [NEWS SECTION] 뉴스 그리드 디자인 */
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .news-card {
            background-color: var(--card-bg);
            border: 1px solid #222;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.4s ease;
            min-height: 160px;
        }

        .news-card:hover {
            transform: translateY(-8px);
            border-color: var(--point-color);
            background-color: var(--card-hover-bg);
            box-shadow: 0 10px 25px rgba(255, 107, 0, 0.15);
        }

        .category {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: block;
        }

        .news-card:hover .category { color: var(--point-color); }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .arrow-icon {
            align-self: flex-end;
            color: #444;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .news-card:hover .arrow-icon {
            color: var(--point-color);
            transform: translateX(5px);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">HYUNDAI <span class="logo-livart">LIVART</span></div>
    </header>

    <div class="section-label">Market Status</div>
    <div class="stock-container">
        <a href="./stock/" class="stock-card">
            <div>
                <h2>현대리바트 (079430)</h2>
                <p>LIVE MARKET DATA • KOSPI</p>
            </div>
            <div class="stock-status">📈</div>
        </a>
    </div>

    <div class="section-label">Latest News</div>
    <div class="container">
        <a href="./fnnews/" class="news-card">
            <div>
                <span class="category">Financial</span>
                <span class="title">현대리바트 공간 가치 최신 소식</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./sisajournal/" class="news-card">
            <div>
                <span class="category">Sisa Journal</span>
                <span class="title">가구 산업 트렌드 및 전략 분석</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./asiae/" class="news-card">
            <div>
                <span class="category">Asia Economy</span>
                <span class="title">시장 점유율 확대를 위한 행보</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./mbn2/" class="news-card">
            <div>
                <span class="category">MBN Money</span>
                <span class="title">B2B와 B2C 아우르는 가구 솔루션</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./insight/" class="news-card">
            <div>
                <span class="category">Insight</span>
                <span class="title">디자인 경쟁력으로 시장 승부수</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./chosun/" class="news-card">
            <div>
                <span class="category">Chosun Ilbo</span>
                <span class="title">가구 시장 재편 및 트렌드 선점</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>

        <a href="./news1/" class="news-card">
            <div>
                <span class="category">News1</span>
                <span class="title">토탈 인테리어 기업 도약</span>
            </div>
            <div class="arrow-icon">→</div>
        </a>
    </div>

</body>
</html>
